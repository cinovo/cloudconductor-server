<div class=" allert-container" [@alertAnim]="alerts.length">
  @for (alert of alerts; track alert) {
    <div class="alert alert-{{alert?.type}} alert-dismissible">
      <button type="button" class="close" aria-label="Close" (click)="removeAlert(alert)">
        <span aria-hidden="true">&times;</span>
      </button>
      {{alert?.msg}}
    </div>
  }
</div>
