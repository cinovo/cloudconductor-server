<cc-title [title]="'Preview Configuration Key-Value-Pairs'" titleIcon="fa-code-fork"></cc-title>

<div class="row">
  <div class="col-md-4">
    <cc-filter mode="select" label="Template" [data]="templateNames" [selected]="templateQuery" (onQueryChange)="templateQuery = $event">
    </cc-filter>
  </div>
  <div class="col-md-4">
    <cc-filter mode="select" label="Service" [data]="serviceNames" (onQueryChange)="serviceQuery = $event">
    </cc-filter>
  </div>
  <div class="col-md-4">
    <cc-filter mode="select" label="Mode" [data]="modes" (onQueryChange)="modeQuery = $event" [selected]="modes[0]">
    </cc-filter>
  </div>
</div>

<div class="row">
  <div class="col-md-12">
    <cc-panel [title]="'Preview'" icon="fa-list-alt">
      <div cc-panel-body>
        @if (preview && preview !== null && modeQuery === modes[0]) {
          <pre>{{ preview | json }}</pre>
        }
        @if (preview && modeQuery !== modes[0]) {
          <pre>{{ preview }}</pre>
        }
        @if (!preview) {
          <div class="alert alert-warning">Nothing found</div>
        }
      </div>
    </cc-panel>
  </div>
</div>
